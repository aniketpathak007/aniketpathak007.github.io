<!DOCTYPE html>
<html>
<head>
  <title>AniketPathak | Game Developer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f19;
      color: white;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      background: #171a21;
      padding: 15px 30px;
      border-bottom: 1px solid #2a2f3a;
    }

    .logo {
      color: #66c0f4;
      font-size: 22px;
      font-weight: bold;
    }

    .nav-links a {
      margin-left: 20px;
      color: #c7d5e0;
      text-decoration: none;
    }

    .nav-links a:hover {
      color: #66c0f4;
    }

    /* HERO */
    .hero {
      padding: 40px;
      background: linear-gradient(to right, #0b0f19, #1b2838);
    }

    .hero h1 {
      color: #66c0f4;
      font-size: 32px;
    }

    .hero iframe {
      margin-top: 20px;
      width: 100%;
      max-width: 900px;
      height: 400px;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 20px;
      background: #66c0f4;
      color: black;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #4fa3d1;
    }

    /* SECTION */
    .section {
      padding: 40px;
    }

    h2 {
      color: #66c0f4;
    }

    /* GAME GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .game-card {
      background: #171a21;
      border-radius: 10px;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid #2a2f3a;
    }

    .game-card:hover {
      transform: scale(1.03);
      border-color: #66c0f4;
    }

    .game-card iframe {
      width: 100%;
      height: 180px;
    }

    .game-info {
      padding: 15px;
    }

    .tag {
      background: #66c0f4;
      color: black;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      display: inline-block;
      margin-bottom: 8px;
    }

    /* AI SECTION */
    .ai-box {
      background: #171a21;
      padding: 20px;
      border-radius: 10px;
      margin-top: 20px;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">AniketPathak</div>
  <div class="nav-links">
    <a href="#games">Games</a>
    <a href="#ai">AI</a>
    <a href="#about">About</a>
  </div>
</div>

<!-- HERO (FEATURED GAME) -->
<div class="hero">
  <h1>🔥 Featured Game: PvZ - A New Start</h1>

  <iframe src="https://turbowarp.org/1084340167/embed"></iframe>

  <br>
  <a href="https://turbowarp.org/1084340167" target="_blank" class="btn">
    ▶ Play Now
  </a>
</div>

<!-- GAMES -->
<div class="section" id="games">
  <h2>🎮 Game Library</h2>

  <div class="grid">

    <!-- GAME 1 -->
    <div class="game-card">
      <iframe src="https://turbowarp.org/1084340167/embed"></iframe>
      <div class="game-info">
        <div class="tag">🔥 Featured</div>
        <h3>PvZ - TurboWarp</h3>
        <a href="https://turbowarp.org/1084340167" target="_blank">▶ Play</a>
      </div>
    </div>

    <!-- GAME 2 -->
    <div class="game-card">
      <iframe src="PvZ.html"></iframe>
      <div class="game-info">
        <div class="tag">🆕 New</div>
        <h3>PvZ - HTML Version</h3>
        <a href="PvZ.html" target="_blank">▶ Play</a>
      </div>
    </div>

  </div>
</div>

<!-- AI -->
<div class="section" id="ai">
  <h2>🤖 AI Game Generator</h2>

  <button class="btn" onclick="generateGame()">Generate Idea</button>

  <div class="ai-box" id="aiResult" style="display:none;">
    <h3 id="gameTitle"></h3>
    <p><b>Genre:</b> <span id="genre"></span></p>
    <p><b>Theme:</b> <span id="theme"></span></p>
    <p><b>Power:</b> <span id="power"></span></p>
  </div>
</div>

<!-- ABOUT -->
<div class="section" id="about">
  <h2>👋 About Me</h2>
  <p>
    Hi, I’m Aniket 👋 <br><br>
    I build games and experiment with AI 🚀
  </p>
</div>

<script>
function generateGame() {
  let titles = ["Shadow Battle", "Zombie Rush", "AI Arena", "Galaxy Defense"];
  let genres = ["Strategy", "Survival", "Puzzle", "Shooter"];
  let themes = ["Space", "Jungle", "Future City", "Underwater"];
  let powers = [
    "Time freeze ability",
    "AI learns your moves",
    "Double damage mode",
    "Clone yourself"
  ];

  document.getElementById("gameTitle").innerText =
    titles[Math.floor(Math.random()*titles.length)];

  document.getElementById("genre").innerText =
    genres[Math.floor(Math.random()*genres.length)];

  document.getElementById("theme").innerText =
    themes[Math.floor(Math.random()*themes.length)];

  document.getElementById("power").innerText =
    powers[Math.floor(Math.random()*powers.length)];

  document.getElementById("aiResult").style.display = "block";
}
</script>

</body>
</html>
